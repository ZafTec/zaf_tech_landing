name: ci

on:
  pull_request:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: zaftech
          POSTGRES_PASSWORD: zaftech
          POSTGRES_DB: zaftech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zaftech -d zaftech_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && echo "Postgres is up" && exit 0
            sleep 1
          done
          echo "Postgres did not become ready in time" && exit 1

      - name: Install deps
        run: bun install

      - name: Lint
        run: bun run lint

      # Mirrors the Docker build step. Catches any module-init / prerender
      # errors before they break the deploy pipeline. We pass dummy values
      # for the secrets so the build can complete without throwing — the
      # real values land at container runtime via env_file.
      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgres://zaftech:zaftech@127.0.0.1:5432/zaftech_test
          BETTER_AUTH_URL: http://localhost:4321
          BETTER_AUTH_SECRET: ci-build-secret-not-used-for-real-traffic
          GOOGLE_CLIENT_ID: ci-build-not-real
          GOOGLE_CLIENT_SECRET: ci-build-not-real

      - name: Test
        run: bun run test
        env:
          DATABASE_URL: postgres://zaftech:zaftech@127.0.0.1:5432/zaftech_test
